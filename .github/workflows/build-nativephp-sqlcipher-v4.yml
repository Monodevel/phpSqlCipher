name: Build NativePHP SQLCipher v4

on:
  push:
    branches: [main]
    paths: [".github/workflows/build-nativephp-sqlcipher-v4.yml"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 240
    env:
      PHP_BRANCH: "8.5"
      PHP_VERSION_EXPECTED: "8.5.7"
      SQLCIPHER_VERSION: "4.16.0"
      SPC_VERSION: "2.8.5"
      PHP_EXTENSIONS: bcmath,bz2,ctype,curl,dom,fileinfo,filter,gd,iconv,intl,mbstring,mbregex,opcache,openssl,pdo,pdo_sqlite,phar,session,simplexml,sockets,sodium,sqlite3,tokenizer,xml,zip,zlib
      PHP_LIBS: libjpeg,freetype,libwebp

    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer
          extensions: curl,openssl,mbstring,sodium,tokenizer,filter
          ini-values: memory_limit=-1

      - name: Preparar herramientas
        shell: pwsh
        run: |
          where.exe cl
          where.exe nmake
          if ($env:VisualStudioVersion -notmatch '^17\.') { throw 'Se requiere Visual Studio 2022.' }

          $candidates = @(
            'C:\Program Files\OpenSSL\include',
            'C:\Program Files\OpenSSL-Win64\include'
          )
          $openssl = $candidates | Where-Object { Test-Path "$_\openssl\evp.h" } | Select-Object -First 1
          if (-not $openssl) { throw 'No se encontraron encabezados OpenSSL.' }
          Add-Content $env:GITHUB_ENV "INCLUDE=$openssl;$env:INCLUDE"

          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\spc\bin" | Out-Null
          Invoke-WebRequest -Uri "https://github.com/crazywhalecc/static-php-cli/releases/download/$env:SPC_VERSION/spc-windows-x64.exe" -OutFile "$env:GITHUB_WORKSPACE\spc\bin\spc.exe"
          & "$env:GITHUB_WORKSPACE\spc\bin\spc.exe" --version
          if ($LASTEXITCODE -ne 0) { throw 'No se pudo ejecutar SPC.' }

      - name: Descargar dependencias
        shell: pwsh
        working-directory: spc
        run: |
          .\bin\spc.exe download --with-php=$env:PHP_BRANCH --for-extensions="$env:PHP_EXTENSIONS" --prefer-pre-built
          if ($LASTEXITCODE -ne 0) { throw 'Falló spc download.' }
          .\bin\spc.exe extract sqlite
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path '.\source\sqlite')) { throw 'Falló spc extract sqlite.' }

      - name: Preparar SQLCipher
        shell: pwsh
        run: |
          $src = "$env:GITHUB_WORKSPACE\sqlcipher"
          git clone --depth 1 --branch "v$env:SQLCIPHER_VERSION" https://github.com/sqlcipher/sqlcipher.git $src
          if (-not (Test-Path "$src\Makefile.msc")) { throw 'No se descargó SQLCipher.' }

          $mf = "$src\Makefile.msc"
          $text = (Get-Content $mf -Raw).Replace('/NODEFAULTLIB:msvcrt','').Replace('-NODEFAULTLIB:msvcrt','')
          Set-Content $mf $text -Encoding ascii

          Push-Location $src
          try {
            nmake /nologo /f Makefile.msc sqlite3.c PLATFORM=x64 USE_CRT_DLL=1 USE_NATIVE_LIBPATHS=1 SYMBOLS=0 DEBUG=0 NO_TCL=1 USE_FULLWARN=0 OPTIMIZATIONS=2
            if ($LASTEXITCODE -ne 0) { throw 'Falló la amalgamación SQLCipher.' }
          } finally { Pop-Location }

          $sqlite = "$env:GITHUB_WORKSPACE\spc\source\sqlite"
          Copy-Item "$src\sqlite3.c" "$sqlite\sqlite3.c" -Force
          Copy-Item "$src\sqlite3.h" "$sqlite\sqlite3.h" -Force
          Copy-Item "$src\sqlite3ext.h" "$sqlite\sqlite3ext.h" -Force

          $file = "$sqlite\sqlite3.c"
          $prefix = @'
          #define SQLITE_HAS_CODEC 1
          #define SQLITE_EXTRA_INIT sqlcipher_extra_init
          #define SQLITE_EXTRA_SHUTDOWN sqlcipher_extra_shutdown
          #define SQLCIPHER_CRYPTO_OPENSSL 1
          #define SQLITE_TEMP_STORE 2
          '@
          Set-Content $file ($prefix + "`r`n" + (Get-Content $file -Raw)) -Encoding ascii

      - name: Compilar runtime NativePHP
        shell: pwsh
        working-directory: spc
        run: |
          $log = "$env:GITHUB_WORKSPACE\spc-build.log"
          & .\bin\spc.exe build --build-cli "$env:PHP_EXTENSIONS" --with-libs="$env:PHP_LIBS" --debug *> $log
          $code = $LASTEXITCODE
          if ($code -ne 0) {
            Write-Host '===== ÚLTIMAS 250 LÍNEAS ====='
            Get-Content $log -Tail 250
            throw "Falló spc build con código $code."
          }
          Get-Content $log -Tail 80

      - name: Validar y empaquetar
        shell: pwsh
        run: |
          $php = "$env:GITHUB_WORKSPACE\spc\buildroot\bin\php.exe"
          if (-not (Test-Path $php)) { throw 'No se generó php.exe.' }

          $version = & $php -r "echo PHP_VERSION;"
          $nts = & $php -r "echo PHP_ZTS ? 'TS' : 'NTS';"
          $cipher = & $php -r '$pdo=new PDO("sqlite::memory:"); echo $pdo->query("PRAGMA cipher_version")->fetchColumn();'

          Write-Host "PHP=$version"
          Write-Host "THREAD_SAFETY=$nts"
          Write-Host "SQLCIPHER=$cipher"

          if ($version -ne $env:PHP_VERSION_EXPECTED) { throw "Versión incorrecta: $version" }
          if ($nts -ne 'NTS') { throw 'El runtime no es NTS.' }
          if ([string]::IsNullOrWhiteSpace($cipher)) { throw 'SQLCipher no está activo.' }

          $test = "$env:GITHUB_WORKSPACE\verify.php"
          @'
          <?php
          $p=sys_get_temp_dir().DIRECTORY_SEPARATOR.'sqlcipher-test.sqlite'; @unlink($p);
          $db=new PDO('sqlite:'.$p,null,null,[PDO::ATTR_ERRMODE=>PDO::ERRMODE_EXCEPTION]);
          $db->exec("PRAGMA key='nativephp-key'; CREATE TABLE t(v TEXT); INSERT INTO t VALUES('ok');"); unset($db);
          $h=file_get_contents($p,false,null,0,16);
          if ($h===false || str_starts_with($h,'SQLite format 3')) exit(1);
          $db=new PDO('sqlite:'.$p,null,null,[PDO::ATTR_ERRMODE=>PDO::ERRMODE_EXCEPTION]);
          $db->exec("PRAGMA key='nativephp-key';");
          if ($db->query('SELECT v FROM t')->fetchColumn()!=='ok') exit(1);
          @unlink($p); echo "Encrypted database verified\n";
          '@ | Set-Content $test -Encoding utf8
          & $php $test
          if ($LASTEXITCODE -ne 0) { throw 'Falló la prueba de cifrado.' }

          $dir = "$env:GITHUB_WORKSPACE\dist\bin\win\x64"
          $zip = "$dir\php-8.5.zip"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Compress-Archive -Path $php -DestinationPath $zip -Force
          Add-Content $env:GITHUB_ENV "NATIVEPHP_ZIP=$zip"

      - uses: actions/upload-artifact@v4
        with:
          name: nativephp-php-8.5.7-windows-x64-sqlcipher-4.16.0
          path: ${{ env.NATIVEPHP_ZIP }}
          if-no-files-found: error
          retention-days: 30
