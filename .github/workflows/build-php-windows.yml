name: Build PHP with SQLCipher for Windows

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: "Versión exacta de PHP"
        required: true
        default: "8.5.7"

      sqlcipher_version:
        description: "Versión exacta de SQLCipher"
        required: true
        default: "4.16.0"

permissions:
  contents: read

jobs:
  build:
    name: PHP ${{ inputs.php_version }} + SQLCipher ${{ inputs.sqlcipher_version }}
    runs-on: windows-2022
    timeout-minutes: 180

    env:
      PHP_VERSION: ${{ inputs.php_version }}
      SQLCIPHER_VERSION: ${{ inputs.sqlcipher_version }}

      BUILD_ROOT: C:\build
      PHP_SDK: C:\php-sdk
      PHP_TREE_NAME: phpdev

      SQLCIPHER_SOURCE: C:\build\sqlcipher
      OUTPUT_DIRECTORY: C:\build\output
      PACKAGE_DIRECTORY: C:\build\package

    steps:
      # ============================================================
      # PREPARACIÓN
      # ============================================================

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Visual Studio 2022 x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Mostrar entorno
        shell: pwsh
        run: |
          Write-Host "PHP_VERSION=$env:PHP_VERSION"
          Write-Host "SQLCIPHER_VERSION=$env:SQLCIPHER_VERSION"

          where.exe cl
          where.exe nmake
          where.exe dumpbin
          git --version

      - name: Crear directorios
        shell: pwsh
        run: |
          New-Item `
            -ItemType Directory `
            -Force `
            -Path `
              $env:BUILD_ROOT, `
              $env:OUTPUT_DIRECTORY, `
              $env:PACKAGE_DIRECTORY |
            Out-Null

      # ============================================================
      # PHP SDK
      # ============================================================

      - name: Descargar PHP SDK
        shell: pwsh
        run: |
          if (Test-Path $env:PHP_SDK) {
            Remove-Item `
              $env:PHP_SDK `
              -Recurse `
              -Force
          }

          git clone `
            --depth 1 `
            --branch php-sdk-2.7.1 `
            https://github.com/php/php-sdk-binary-tools.git `
            $env:PHP_SDK

          if (-not (
            Test-Path "$env:PHP_SDK\phpsdk-vs17-x64.bat"
          )) {
            throw "No se encontró phpsdk-vs17-x64.bat."
          }

      - name: Crear árbol PHP SDK
        shell: pwsh
        run: |
          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%PHP_SDK%"

          call phpsdk_buildtree %PHP_TREE_NAME%

          if errorlevel 1 exit /b %errorlevel%

          exit /b 0
          '@

          $taskPath = Join-Path `
            $env:BUILD_ROOT `
            "create-buildtree.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló phpsdk_buildtree."
          }

      - name: Localizar árbol PHP SDK
        shell: pwsh
        run: |
          $treeRoot = Join-Path `
            $env:PHP_SDK `
            $env:PHP_TREE_NAME

          $architectureRoot = Get-ChildItem `
            -Path $treeRoot `
            -Directory `
            -Recurse `
            -ErrorAction SilentlyContinue |
            Where-Object {
              $_.Name -eq "x64" -and
              $_.Parent.Name -match "^vs[0-9]+$"
            } |
            Select-Object -First 1

          if (-not $architectureRoot) {
            throw "No se encontró el directorio vsXX\x64."
          }

          $phpBuildRoot = $architectureRoot.FullName
          $phpSource = Join-Path $phpBuildRoot "php-src"
          $phpDeps = Join-Path $phpBuildRoot "deps"

          Add-Content `
            -Path $env:GITHUB_ENV `
            -Value "PHP_BUILD_ROOT=$phpBuildRoot" `
            -Encoding utf8

          Add-Content `
            -Path $env:GITHUB_ENV `
            -Value "PHP_SOURCE=$phpSource" `
            -Encoding utf8

          Add-Content `
            -Path $env:GITHUB_ENV `
            -Value "PHP_DEPS=$phpDeps" `
            -Encoding utf8

          Write-Host "PHP_BUILD_ROOT=$phpBuildRoot"
          Write-Host "PHP_SOURCE=$phpSource"
          Write-Host "PHP_DEPS=$phpDeps"

      # ============================================================
      # FUENTES
      # ============================================================

      - name: Descargar PHP
        shell: pwsh
        run: |
          if (Test-Path $env:PHP_SOURCE) {
            Remove-Item `
              $env:PHP_SOURCE `
              -Recurse `
              -Force
          }

          git clone `
            --depth 1 `
            --branch "php-$env:PHP_VERSION" `
            https://github.com/php/php-src.git `
            $env:PHP_SOURCE

          if (-not (
            Test-Path "$env:PHP_SOURCE\buildconf.bat"
          )) {
            throw "No se descargó correctamente PHP."
          }

          git -C $env:PHP_SOURCE describe --tags --always

      - name: Descargar SQLCipher
        shell: pwsh
        run: |
          if (Test-Path $env:SQLCIPHER_SOURCE) {
            Remove-Item `
              $env:SQLCIPHER_SOURCE `
              -Recurse `
              -Force
          }

          git clone `
            --depth 1 `
            --branch "v$env:SQLCIPHER_VERSION" `
            https://github.com/sqlcipher/sqlcipher.git `
            $env:SQLCIPHER_SOURCE

          if (-not (
            Test-Path "$env:SQLCIPHER_SOURCE\Makefile.msc"
          )) {
            throw "No se descargó correctamente SQLCipher."
          }

          git -C $env:SQLCIPHER_SOURCE describe --tags --always

      # ============================================================
      # DEPENDENCIAS DE PHP
      # ============================================================

      - name: Descargar dependencias oficiales de PHP
        shell: pwsh
        run: |
          $versionParts = $env:PHP_VERSION.Split(".")

          if ($versionParts.Count -lt 2) {
            throw "PHP_VERSION no es válida."
          }

          $phpBranch = "$($versionParts[0]).$($versionParts[1])"

          Write-Host "Rama de dependencias: $phpBranch"

          $task = @"
          @echo off
          setlocal EnableExtensions

          cd /d "%PHP_SOURCE%"

          call phpsdk_deps --update --branch $phpBranch

          if errorlevel 1 exit /b %errorlevel%

          exit /b 0
          "@

          $taskPath = Join-Path `
            $env:BUILD_ROOT `
            "download-deps.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló phpsdk_deps."
          }

      - name: Verificar dependencias PHP
        shell: pwsh
        run: |
          foreach ($directory in @(
            "$env:PHP_DEPS\include",
            "$env:PHP_DEPS\lib",
            "$env:PHP_DEPS\bin"
          )) {
            if (-not (Test-Path $directory)) {
              New-Item `
                -ItemType Directory `
                -Force `
                -Path $directory |
                Out-Null
            }
          }

          if (-not (
            Test-Path "$env:PHP_DEPS\include\openssl\evp.h"
          )) {
            throw "No se encontró openssl\evp.h."
          }

          if (-not (
            Test-Path "$env:PHP_DEPS\lib\libcrypto.lib"
          )) {
            throw "No se encontró libcrypto.lib."
          }

          if (-not (
            Test-Path "$env:PHP_DEPS\lib\libssl.lib"
          )) {
            throw "No se encontró libssl.lib."
          }

          Add-Content `
            -Path $env:GITHUB_ENV `
            -Value "OPENSSL_INCLUDE=$env:PHP_DEPS\include" `
            -Encoding utf8

          Add-Content `
            -Path $env:GITHUB_ENV `
            -Value "OPENSSL_LIB=$env:PHP_DEPS\lib" `
            -Encoding utf8

      # ============================================================
      # SQLCIPHER
      # ============================================================

      - name: Corregir Makefile.msc
        shell: pwsh
        run: |
          $makefilePath = Join-Path `
            $env:SQLCIPHER_SOURCE `
            "Makefile.msc"

          $content = Get-Content `
            -Path $makefilePath `
            -Raw

          $content = $content.Replace(
            "/NODEFAULTLIB:msvcrt",
            ""
          )

          $content = $content.Replace(
            "-NODEFAULTLIB:msvcrt",
            ""
          )

          Set-Content `
            -Path $makefilePath `
            -Value $content `
            -Encoding ascii

          if (
            Select-String `
              -Path $makefilePath `
              -Pattern "NODEFAULTLIB:msvcrt" `
              -SimpleMatch
          ) {
            throw "No se pudo corregir Makefile.msc."
          }

      - name: Generar amalgamación SQLCipher
        shell: pwsh
        run: |
          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%SQLCIPHER_SOURCE%"

          del /q sqlite3.c 2>nul
          del /q sqlite3.h 2>nul
          del /q sqlite3ext.h 2>nul
          del /q lemon.exe 2>nul
          del /q lemon.obj 2>nul
          del /q jimsh0.exe 2>nul
          del /q jimsh0.obj 2>nul

          nmake /nologo /f Makefile.msc sqlite3.c ^
            PLATFORM=x64 ^
            USE_CRT_DLL=1 ^
            USE_NATIVE_LIBPATHS=1 ^
            SYMBOLS=0 ^
            DEBUG=0 ^
            NO_TCL=1 ^
            USE_FULLWARN=0 ^
            OPTIMIZATIONS=2

          if errorlevel 1 exit /b %errorlevel%

          if not exist sqlite3.c exit /b 1
          if not exist sqlite3.h exit /b 1
          if not exist sqlite3ext.h exit /b 1

          exit /b 0
          '@

          $taskPath = Join-Path `
            $env:BUILD_ROOT `
            "generate-sqlcipher.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló la generación de SQLCipher."
          }

      - name: Compilar SQLCipher DLL
        shell: pwsh
        run: |
          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%SQLCIPHER_SOURCE%"

          del /q sqlite3.obj 2>nul
          del /q sqlite3.dll 2>nul
          del /q sqlite3.lib 2>nul
          del /q sqlite3.exp 2>nul

          cl.exe ^
            /nologo ^
            /O2 ^
            /MD ^
            /LD ^
            /D_CRT_SECURE_NO_WARNINGS=1 ^
            /D_CRT_NONSTDC_NO_DEPRECATE=1 ^
            /DHAVE_STDINT_H=1 ^
            /DSQLITE_HAS_CODEC=1 ^
            /DSQLITE_EXTRA_INIT=sqlcipher_extra_init ^
            /DSQLITE_EXTRA_SHUTDOWN=sqlcipher_extra_shutdown ^
            /DSQLCIPHER_CRYPTO_OPENSSL=1 ^
            /DSQLITE_TEMP_STORE=2 ^
            /DSQLITE_THREADSAFE=1 ^
            /DSQLITE_ENABLE_COLUMN_METADATA=1 ^
            /DSQLITE_ENABLE_FTS3=1 ^
            /DSQLITE_ENABLE_FTS4=1 ^
            /DSQLITE_ENABLE_FTS5=1 ^
            /DSQLITE_ENABLE_RTREE=1 ^
            /DSQLITE_ENABLE_UNLOCK_NOTIFY=1 ^
            /DSQLITE_ENABLE_MATH_FUNCTIONS=1 ^
            /DSQLITE_API=__declspec(dllexport) ^
            /I"%OPENSSL_INCLUDE%" ^
            sqlite3.c ^
            /link ^
            /OUT:sqlite3.dll ^
            /IMPLIB:sqlite3.lib ^
            /LIBPATH:"%OPENSSL_LIB%" ^
            libcrypto.lib ^
            libssl.lib ^
            crypt32.lib ^
            bcrypt.lib ^
            advapi32.lib ^
            user32.lib ^
            ws2_32.lib

          if errorlevel 1 exit /b %errorlevel%

          if not exist sqlite3.dll exit /b 1
          if not exist sqlite3.lib exit /b 1

          exit /b 0
          '@

          $taskPath = Join-Path `
            $env:BUILD_ROOT `
            "compile-sqlcipher.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló la compilación de SQLCipher."
          }

      - name: Verificar SQLCipher compilado
        shell: pwsh
        run: |
          foreach ($requiredFile in @(
            "$env:SQLCIPHER_SOURCE\sqlite3.c",
            "$env:SQLCIPHER_SOURCE\sqlite3.h",
            "$env:SQLCIPHER_SOURCE\sqlite3ext.h",
            "$env:SQLCIPHER_SOURCE\sqlite3.dll",
            "$env:SQLCIPHER_SOURCE\sqlite3.lib"
          )) {
            if (-not (Test-Path $requiredFile)) {
              throw "Archivo SQLCipher ausente: $requiredFile"
            }

            Get-Item $requiredFile |
              Select-Object FullName, Length
          }

      - name: Reemplazar SQLite oficial en deps
        shell: pwsh
        run: |
          $includeDirectory = "$env:PHP_DEPS\include"
          $libDirectory = "$env:PHP_DEPS\lib"
          $binDirectory = "$env:PHP_DEPS\bin"

          Get-ChildItem `
            -Path $libDirectory `
            -Filter "*sqlite*.lib" `
            -File `
            -ErrorAction SilentlyContinue |
            Remove-Item -Force

          Get-ChildItem `
            -Path $binDirectory `
            -Filter "*sqlite*.dll" `
            -File `
            -ErrorAction SilentlyContinue |
            Remove-Item -Force

          Remove-Item `
            "$includeDirectory\sqlite3.h" `
            -Force `
            -ErrorAction SilentlyContinue

          Remove-Item `
            "$includeDirectory\sqlite3ext.h" `
            -Force `
            -ErrorAction SilentlyContinue

          Copy-Item `
            "$env:SQLCIPHER_SOURCE\sqlite3.h" `
            "$includeDirectory\sqlite3.h" `
            -Force

          Copy-Item `
            "$env:SQLCIPHER_SOURCE\sqlite3ext.h" `
            "$includeDirectory\sqlite3ext.h" `
            -Force

          Copy-Item `
            "$env:SQLCIPHER_SOURCE\sqlite3.lib" `
            "$libDirectory\sqlite3.lib" `
            -Force

          Copy-Item `
            "$env:SQLCIPHER_SOURCE\sqlite3.lib" `
            "$libDirectory\sqlite3_a.lib" `
            -Force

          Copy-Item `
            "$env:SQLCIPHER_SOURCE\sqlite3.dll" `
            "$binDirectory\sqlite3.dll" `
            -Force

          foreach ($requiredFile in @(
            "$includeDirectory\sqlite3.h",
            "$includeDirectory\sqlite3ext.h",
            "$libDirectory\sqlite3.lib",
            "$libDirectory\sqlite3_a.lib",
            "$binDirectory\sqlite3.dll"
          )) {
            if (-not (Test-Path $requiredFile)) {
              throw "Archivo ausente en deps: $requiredFile"
            }

            Get-Item $requiredFile |
              Select-Object FullName, Length
          }

      - name: Probar SQLCipher directamente
        shell: pwsh
        run: |
          $source = @'
          #include <stdio.h>
          #include "sqlite3.h"

          int main(void)
          {
              sqlite3 *db = NULL;
              sqlite3_stmt *statement = NULL;

              if (sqlite3_open(":memory:", &db) != SQLITE_OK) {
                  return 1;
              }

              if (
                  sqlite3_prepare_v2(
                      db,
                      "PRAGMA cipher_version;",
                      -1,
                      &statement,
                      NULL
                  ) != SQLITE_OK
              ) {
                  sqlite3_close(db);
                  return 1;
              }

              if (sqlite3_step(statement) != SQLITE_ROW) {
                  sqlite3_finalize(statement);
                  sqlite3_close(db);
                  return 1;
              }

              const unsigned char *version =
                  sqlite3_column_text(statement, 0);

              if (version == NULL || version[0] == '\0') {
                  sqlite3_finalize(statement);
                  sqlite3_close(db);
                  return 1;
              }

              printf("SQLCipher DLL: %s\n", version);

              sqlite3_finalize(statement);
              sqlite3_close(db);

              return 0;
          }
          '@

          Set-Content `
            -Path "$env:BUILD_ROOT\test-sqlcipher.c" `
            -Value $source `
            -Encoding ascii

          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%BUILD_ROOT%"

          cl.exe ^
            /nologo ^
            /O2 ^
            /MD ^
            /I"%SQLCIPHER_SOURCE%" ^
            test-sqlcipher.c ^
            /link ^
            /OUT:test-sqlcipher.exe ^
            /LIBPATH:"%SQLCIPHER_SOURCE%" ^
            sqlite3.lib

          if errorlevel 1 exit /b %errorlevel%

          copy /Y ^
            "%SQLCIPHER_SOURCE%\sqlite3.dll" ^
            "%BUILD_ROOT%\sqlite3.dll" >nul

          copy /Y ^
            "%PHP_DEPS%\bin\libcrypto*.dll" ^
            "%BUILD_ROOT%\" >nul 2>nul

          copy /Y ^
            "%PHP_DEPS%\bin\libssl*.dll" ^
            "%BUILD_ROOT%\" >nul 2>nul

          "%BUILD_ROOT%\test-sqlcipher.exe"

          if errorlevel 1 exit /b %errorlevel%

          exit /b 0
          '@

          $taskPath = Join-Path `
            $env:BUILD_ROOT `
            "test-sqlcipher.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "La DLL compilada no contiene SQLCipher."
          }

      # ============================================================
      # COMPILACIÓN DE PHP
      # ============================================================

      - name: Ejecutar buildconf
        shell: pwsh
        run: |
          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%PHP_SOURCE%"

          call buildconf.bat --force

          if errorlevel 1 exit /b %errorlevel%

          exit /b 0
          '@

          $taskPath = Join-Path `
            $env:BUILD_ROOT `
            "php-buildconf.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló buildconf."
          }

      - name: Configurar PHP con SQLCipher
        shell: pwsh
        run: |
          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%PHP_SOURCE%"

          call configure.bat ^
            --disable-all ^
            --disable-zts ^
            --enable-cli ^
            --enable-cgi ^
            --enable-pdo ^
            --enable-ctype ^
            --enable-filter ^
            --enable-session ^
            --enable-tokenizer ^
            --enable-mbstring ^
            --enable-fileinfo ^
            --enable-sockets ^
            --enable-phar ^
            --enable-opcache ^
            --with-openssl ^
            --with-curl ^
            --with-zlib ^
            --with-zip ^
            --with-iconv ^
            --with-sqlite3=shared ^
            --with-pdo-sqlite=shared ^
            --with-php-build="%PHP_DEPS%"

          if errorlevel 1 exit /b %errorlevel%

          exit /b 0
          '@

          $taskPath = Join-Path `
            $env:BUILD_ROOT `
            "php-configure.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            if (Test-Path "$env:PHP_SOURCE\config.log") {
              Get-Content `
                "$env:PHP_SOURCE\config.log" `
                -Tail 400
            }

            throw "Falló configure."
          }

      - name: Verificar configuración SQLite
        shell: pwsh
        run: |
          $makefilePath = "$env:PHP_SOURCE\Makefile"

          if (-not (Test-Path $makefilePath)) {
            throw "No se generó Makefile."
          }

          $makefileContent = Get-Content `
            -Path $makefilePath `
            -Raw

          Write-Host "Referencias SQLite en Makefile:"

          Select-String `
            -Path $makefilePath `
            -Pattern `
              "pdo_sqlite", `
              "php_pdo_sqlite", `
              "php_sqlite3", `
              "sqlite3.lib", `
              "sqlite3_a.lib" |
            Select-Object -First 100

          if (
            $makefileContent -notmatch
            "php_pdo_sqlite"
          ) {
            throw "pdo_sqlite no quedó configurado como DLL."
          }

          if (
            $makefileContent -notmatch
            "php_sqlite3"
          ) {
            throw "sqlite3 no quedó configurado como DLL."
          }

      - name: Compilar PHP
        shell: pwsh
        run: |
          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%PHP_SOURCE%"

          nmake

          if errorlevel 1 exit /b %errorlevel%

          exit /b 0
          '@

          $taskPath = Join-Path `
            $env:BUILD_ROOT `
            "php-nmake.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló la compilación de PHP."
          }

      # ============================================================
      # LOCALIZAR BINARIOS
      # ============================================================

      - name: Localizar directorio Release
        shell: pwsh
        run: |
          $phpExecutable = Get-ChildItem `
            -Path $env:PHP_SOURCE `
            -Filter "php.exe" `
            -Recurse `
            -File `
            -ErrorAction SilentlyContinue |
            Where-Object {
              $_.FullName -match
                '[\\/]x64[\\/]Release[\\/]php\.exe$'
            } |
            Select-Object -First 1

          if (-not $phpExecutable) {
            Write-Host "Archivos php.exe encontrados:"

            Get-ChildItem `
              -Path $env:PHP_SOURCE `
              -Filter "php.exe" `
              -Recurse `
              -File `
              -ErrorAction SilentlyContinue |
              Select-Object FullName

            throw "No se encontró php.exe en x64\Release."
          }

          $releaseDirectory =
            $phpExecutable.Directory.FullName

          Add-Content `
            -Path $env:GITHUB_ENV `
            -Value "PHP_RELEASE=$releaseDirectory" `
            -Encoding utf8

          Write-Host "PHP_RELEASE=$releaseDirectory"

      - name: Localizar extensiones SQLite
        shell: pwsh
        run: |
          $releaseDirectory = $env:PHP_RELEASE

          $pdoPath = Join-Path `
            $releaseDirectory `
            "php_pdo_sqlite.dll"

          $sqlitePath = Join-Path `
            $releaseDirectory `
            "php_sqlite3.dll"

          if (-not (Test-Path $pdoPath)) {
            Write-Host "Contenido del directorio Release:"

            Get-ChildItem `
              -Path $releaseDirectory `
              -File |
              Sort-Object Name |
              Select-Object Name, Length

            throw "No se generó php_pdo_sqlite.dll."
          }

          if (-not (Test-Path $sqlitePath)) {
            Write-Host "Contenido del directorio Release:"

            Get-ChildItem `
              -Path $releaseDirectory `
              -File |
              Sort-Object Name |
              Select-Object Name, Length

            throw "No se generó php_sqlite3.dll."
          }

          Add-Content `
            -Path $env:GITHUB_ENV `
            -Value "PDO_SQLITE_DLL=$pdoPath" `
            -Encoding utf8

          Add-Content `
            -Path $env:GITHUB_ENV `
            -Value "PHP_SQLITE3_DLL=$sqlitePath" `
            -Encoding utf8

          Get-Item `
            $pdoPath, `
            $sqlitePath |
            Select-Object FullName, Length

      - name: Mostrar dependencias de extensiones
        shell: pwsh
        run: |
          Write-Host "php_pdo_sqlite.dll:"

          & dumpbin.exe `
            /DEPENDENTS `
            $env:PDO_SQLITE_DLL

          Write-Host ""
          Write-Host "php_sqlite3.dll:"

          & dumpbin.exe `
            /DEPENDENTS `
            $env:PHP_SQLITE3_DLL

          if ($LASTEXITCODE -ne 0) {
            throw "dumpbin no pudo analizar las extensiones."
          }

      # ============================================================
      # PREPARAR DISTRIBUCIÓN
      # ============================================================

      - name: Preparar distribución
        shell: pwsh
        run: |
          if (Test-Path $env:OUTPUT_DIRECTORY) {
            Remove-Item `
              $env:OUTPUT_DIRECTORY `
              -Recurse `
              -Force
          }

          New-Item `
            -ItemType Directory `
            -Force `
            -Path `
              $env:OUTPUT_DIRECTORY, `
              "$env:OUTPUT_DIRECTORY\ext" |
            Out-Null

          Copy-Item `
            -Path "$env:PHP_RELEASE\*" `
            -Destination $env:OUTPUT_DIRECTORY `
            -Recurse `
            -Force

          Copy-Item `
            -Path $env:PDO_SQLITE_DLL `
            -Destination (
              "$env:OUTPUT_DIRECTORY\ext\" +
              "php_pdo_sqlite.dll"
            ) `
            -Force

          Copy-Item `
            -Path $env:PHP_SQLITE3_DLL `
            -Destination (
              "$env:OUTPUT_DIRECTORY\ext\" +
              "php_sqlite3.dll"
            ) `
            -Force

          Get-ChildItem `
            -Path "$env:PHP_DEPS\bin" `
            -Filter "*.dll" `
            -File `
            -ErrorAction SilentlyContinue |
            ForEach-Object {
              Copy-Item `
                -Path $_.FullName `
                -Destination $env:OUTPUT_DIRECTORY `
                -Force
            }

          # SQLCipher debe reemplazar cualquier sqlite3.dll
          # convencional copiada desde las dependencias.
          Copy-Item `
            -Path "$env:SQLCIPHER_SOURCE\sqlite3.dll" `
            -Destination "$env:OUTPUT_DIRECTORY\sqlite3.dll" `
            -Force

      - name: Crear php.ini
        shell: pwsh
        run: |
          $phpIni = @'
          [PHP]

          extension_dir="ext"

          extension=php_pdo_sqlite.dll
          extension=php_sqlite3.dll

          display_errors=On
          display_startup_errors=On
          error_reporting=E_ALL

          date.timezone=America/Santiago
          memory_limit=512M
          max_execution_time=0
          variables_order=GPCS
          '@

          Set-Content `
            -Path "$env:OUTPUT_DIRECTORY\php.ini" `
            -Value $phpIni `
            -Encoding ascii

      # ============================================================
      # VALIDACIONES PHP
      # ============================================================

      - name: Verificar archivos de salida
        shell: pwsh
        run: |
          foreach ($requiredFile in @(
            "$env:OUTPUT_DIRECTORY\php.exe",
            "$env:OUTPUT_DIRECTORY\php.ini",
            "$env:OUTPUT_DIRECTORY\sqlite3.dll",
            "$env:OUTPUT_DIRECTORY\ext\php_pdo_sqlite.dll",
            "$env:OUTPUT_DIRECTORY\ext\php_sqlite3.dll"
          )) {
            if (-not (Test-Path $requiredFile)) {
              throw "Archivo de salida ausente: $requiredFile"
            }

            Get-Item $requiredFile |
              Select-Object FullName, Length
          }

      - name: Verificar carga de módulos PHP
        shell: pwsh
        run: |
          $php = "$env:OUTPUT_DIRECTORY\php.exe"
          $phpIni = "$env:OUTPUT_DIRECTORY\php.ini"

          & $php -c $phpIni --ini
          & $php -c $phpIni -v
          & $php -c $phpIni -m

          if ($LASTEXITCODE -ne 0) {
            throw "PHP no pudo cargar las extensiones."
          }

      - name: Verificar PDO SQLite
        shell: pwsh
        run: |
          $script = @'
          <?php

          declare(strict_types=1);

          echo 'PHP: '.PHP_VERSION.PHP_EOL;

          echo 'pdo_sqlite: '
              .(extension_loaded('pdo_sqlite') ? 'sí' : 'no')
              .PHP_EOL;

          echo 'sqlite3: '
              .(extension_loaded('sqlite3') ? 'sí' : 'no')
              .PHP_EOL;

          $drivers = PDO::getAvailableDrivers();

          echo 'Drivers PDO: '
              .implode(', ', $drivers)
              .PHP_EOL;

          if (!extension_loaded('pdo_sqlite')) {
              fwrite(
                  STDERR,
                  "ERROR: pdo_sqlite no está cargado.\n"
              );

              exit(1);
          }

          if (!extension_loaded('sqlite3')) {
              fwrite(
                  STDERR,
                  "ERROR: sqlite3 no está cargado.\n"
              );

              exit(1);
          }

          if (!in_array('sqlite', $drivers, true)) {
              fwrite(
                  STDERR,
                  "ERROR: PDO SQLite no está disponible.\n"
              );

              exit(1);
          }

          echo "PDO SQLite disponible.\n";
          '@

          $scriptPath = Join-Path `
            $env:BUILD_ROOT `
            "test-pdo-sqlite.php"

          Set-Content `
            -Path $scriptPath `
            -Value $script `
            -Encoding utf8

          & "$env:OUTPUT_DIRECTORY\php.exe" `
            -c "$env:OUTPUT_DIRECTORY\php.ini" `
            $scriptPath

          if ($LASTEXITCODE -ne 0) {
            throw "La validación PDO SQLite falló."
          }

      - name: Verificar SQLCipher desde PHP
        shell: pwsh
        run: |
          $script = @'
          <?php

          declare(strict_types=1);

          function fail(string $message): never
          {
              fwrite(
                  STDERR,
                  "ERROR: {$message}".PHP_EOL
              );

              exit(1);
          }

          $pdo = new PDO(
              'sqlite::memory:',
              null,
              null,
              [
                  PDO::ATTR_ERRMODE =>
                      PDO::ERRMODE_EXCEPTION,
              ]
          );

          $version = $pdo
              ->query('PRAGMA cipher_version;')
              ->fetchColumn();

          if (
              !is_string($version) ||
              trim($version) === ''
          ) {
              fail(
                  'PRAGMA cipher_version no devolvió '
                  .'una versión.'
              );
          }

          echo "SQLCipher: {$version}".PHP_EOL;

          $databasePath = sys_get_temp_dir()
              .DIRECTORY_SEPARATOR
              .'sqlcipher-test.sqlite';

          @unlink($databasePath);

          $database = new PDO(
              'sqlite:'.$databasePath,
              null,
              null,
              [
                  PDO::ATTR_ERRMODE =>
                      PDO::ERRMODE_EXCEPTION,
              ]
          );

          $database->exec(
              "PRAGMA key = 'clave-prueba-github';"
          );

          $database->exec(
              'CREATE TABLE prueba (
                  id INTEGER PRIMARY KEY AUTOINCREMENT,
                  valor TEXT NOT NULL
              );'
          );

          $statement = $database->prepare(
              'INSERT INTO prueba (valor)
               VALUES (:valor);'
          );

          $statement->execute([
              'valor' => 'correcto',
          ]);

          unset(
              $statement,
              $database
          );

          $header = file_get_contents(
              $databasePath,
              false,
              null,
              0,
              16
          );

          if ($header === false) {
              fail('No se pudo leer la base de datos.');
          }

          if (
              str_starts_with(
                  $header,
                  'SQLite format 3'
              )
          ) {
              fail(
                  'La base conserva el encabezado '
                  .'SQLite sin cifrar.'
              );
          }

          $database = new PDO(
              'sqlite:'.$databasePath,
              null,
              null,
              [
                  PDO::ATTR_ERRMODE =>
                      PDO::ERRMODE_EXCEPTION,
              ]
          );

          $database->exec(
              "PRAGMA key = 'clave-prueba-github';"
          );

          $value = $database
              ->query(
                  'SELECT valor
                   FROM prueba
                   LIMIT 1;'
              )
              ->fetchColumn();

          if ($value !== 'correcto') {
              fail(
                  'No se pudo leer el contenido cifrado.'
              );
          }

          unset($database);

          $wrongKeyRejected = false;

          try {
              $wrongDatabase = new PDO(
                  'sqlite:'.$databasePath,
                  null,
                  null,
                  [
                      PDO::ATTR_ERRMODE =>
                          PDO::ERRMODE_EXCEPTION,
                  ]
              );

              $wrongDatabase->exec(
                  "PRAGMA key = 'clave-incorrecta';"
              );

              $wrongDatabase
                  ->query(
                      'SELECT valor
                       FROM prueba
                       LIMIT 1;'
                  )
                  ->fetchColumn();
          } catch (Throwable) {
              $wrongKeyRejected = true;
          }

          if (!$wrongKeyRejected) {
              fail(
                  'La base aceptó una clave incorrecta.'
              );
          }

          echo "Archivo cifrado verificado.".PHP_EOL;
          echo "Clave correcta verificada.".PHP_EOL;
          echo "Clave incorrecta rechazada.".PHP_EOL;
          echo "Prueba SQLCipher completada.".PHP_EOL;

          @unlink($databasePath);
          '@

          $scriptPath = Join-Path `
            $env:BUILD_ROOT `
            "test-sqlcipher.php"

          Set-Content `
            -Path $scriptPath `
            -Value $script `
            -Encoding utf8

          & "$env:OUTPUT_DIRECTORY\php.exe" `
            -c "$env:OUTPUT_DIRECTORY\php.ini" `
            $scriptPath

          if ($LASTEXITCODE -ne 0) {
            throw "La validación SQLCipher falló."
          }

      # ============================================================
      # PAQUETE
      # ============================================================

      - name: Crear información del build
        shell: pwsh
        run: |
          $buildInfo = @"
          PHP con SQLCipher para Windows
          =================================

          PHP: $env:PHP_VERSION
          SQLCipher: $env:SQLCIPHER_VERSION
          Arquitectura: x64
          Thread Safety: NTS
          Compilador: Visual Studio 2022

          Validaciones:
          - PHP ejecutable
          - PDO SQLite cargado
          - SQLite3 cargado
          - PRAGMA cipher_version funcional
          - Archivo cifrado
          - Lectura con clave correcta
          - Rechazo de clave incorrecta
          "@

          Set-Content `
            -Path "$env:OUTPUT_DIRECTORY\BUILD-INFO.txt" `
            -Value $buildInfo `
            -Encoding utf8

      - name: Crear ZIP
        shell: pwsh
        run: |
          if (Test-Path $env:PACKAGE_DIRECTORY) {
            Remove-Item `
              $env:PACKAGE_DIRECTORY `
              -Recurse `
              -Force
          }

          New-Item `
            -ItemType Directory `
            -Force `
            -Path $env:PACKAGE_DIRECTORY |
            Out-Null

          $zipName = (
            "php-{0}-nts-windows-x64-sqlcipher-{1}.zip" -f
            $env:PHP_VERSION,
            $env:SQLCIPHER_VERSION
          )

          $zipPath = Join-Path `
            $env:PACKAGE_DIRECTORY `
            $zipName

          Compress-Archive `
            -Path "$env:OUTPUT_DIRECTORY\*" `
            -DestinationPath $zipPath `
            -CompressionLevel Optimal `
            -Force

          if (-not (Test-Path $zipPath)) {
            throw "No se generó el archivo ZIP."
          }

          Add-Content `
            -Path $env:GITHUB_ENV `
            -Value "ZIP_PATH=$zipPath" `
            -Encoding utf8

          Get-Item $zipPath |
            Select-Object FullName, Length

      - name: Publicar artefacto
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ inputs.php_version }}-windows-x64-sqlcipher-${{ inputs.sqlcipher_version }}
          path: ${{ env.ZIP_PATH }}
          if-no-files-found: error
          retention-days: 30
