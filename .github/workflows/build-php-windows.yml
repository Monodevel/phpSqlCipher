name: Build PHP with SQLCipher for Windows

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: "Versión exacta de PHP"
        required: true
        default: "8.5.7"

      sqlcipher_version:
        description: "Versión exacta de SQLCipher"
        required: true
        default: "4.16.0"

permissions:
  contents: read

jobs:
  build:
    name: PHP ${{ inputs.php_version }} + SQLCipher ${{ inputs.sqlcipher_version }}
    runs-on: windows-2022
    timeout-minutes: 180

    env:
      PHP_VERSION: ${{ inputs.php_version }}
      SQLCIPHER_VERSION: ${{ inputs.sqlcipher_version }}

      BUILD_ROOT: C:\build
      PHP_SDK: C:\php-sdk
      PHP_TREE_NAME: phpdev

      SQLCIPHER_SOURCE: C:\build\sqlcipher
      OUTPUT_DIRECTORY: C:\build\output
      PACKAGE_DIRECTORY: C:\build\package

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Visual Studio 2022 x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Crear directorios
        shell: pwsh
        run: |
          New-Item `
            -ItemType Directory `
            -Force `
            -Path `
              $env:BUILD_ROOT, `
              $env:OUTPUT_DIRECTORY, `
              $env:PACKAGE_DIRECTORY |
            Out-Null

      - name: Descargar PHP SDK
        shell: pwsh
        run: |
          if (Test-Path $env:PHP_SDK) {
            Remove-Item $env:PHP_SDK -Recurse -Force
          }

          git clone `
            --depth 1 `
            --branch php-sdk-2.7.1 `
            https://github.com/php/php-sdk-binary-tools.git `
            $env:PHP_SDK

          if (-not (Test-Path "$env:PHP_SDK\phpsdk-vs17-x64.bat")) {
            throw "No se encontró phpsdk-vs17-x64.bat."
          }

      - name: Crear árbol PHP SDK
        shell: pwsh
        run: |
          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%PHP_SDK%"

          call phpsdk_buildtree %PHP_TREE_NAME%

          if errorlevel 1 exit /b %errorlevel%

          exit /b 0
          '@

          $taskPath = Join-Path $env:BUILD_ROOT "create-buildtree.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló phpsdk_buildtree."
          }

      - name: Localizar árbol PHP SDK
        shell: pwsh
        run: |
          $treeRoot = Join-Path $env:PHP_SDK $env:PHP_TREE_NAME

          $architectureRoot = Get-ChildItem `
            -Path $treeRoot `
            -Directory `
            -Recurse |
            Where-Object {
              $_.Name -eq "x64" -and
              $_.Parent.Name -match "^vs[0-9]+$"
            } |
            Select-Object -First 1

          if (-not $architectureRoot) {
            throw "No se encontró el directorio vsXX\x64."
          }

          $phpBuildRoot = $architectureRoot.FullName
          $phpSource = Join-Path $phpBuildRoot "php-src"
          $phpDeps = Join-Path $phpBuildRoot "deps"

          Add-Content `
            -Path $env:GITHUB_ENV `
            -Value "PHP_BUILD_ROOT=$phpBuildRoot" `
            -Encoding utf8

          Add-Content `
            -Path $env:GITHUB_ENV `
            -Value "PHP_SOURCE=$phpSource" `
            -Encoding utf8

          Add-Content `
            -Path $env:GITHUB_ENV `
            -Value "PHP_DEPS=$phpDeps" `
            -Encoding utf8

          Write-Host "PHP_BUILD_ROOT=$phpBuildRoot"
          Write-Host "PHP_SOURCE=$phpSource"
          Write-Host "PHP_DEPS=$phpDeps"

      - name: Descargar PHP
        shell: pwsh
        run: |
          if (Test-Path $env:PHP_SOURCE) {
            Remove-Item $env:PHP_SOURCE -Recurse -Force
          }

          git clone `
            --depth 1 `
            --branch "php-$env:PHP_VERSION" `
            https://github.com/php/php-src.git `
            $env:PHP_SOURCE

          if (-not (Test-Path "$env:PHP_SOURCE\buildconf.bat")) {
            throw "No se descargó correctamente PHP."
          }

      - name: Descargar SQLCipher
        shell: pwsh
        run: |
          if (Test-Path $env:SQLCIPHER_SOURCE) {
            Remove-Item $env:SQLCIPHER_SOURCE -Recurse -Force
          }

          git clone `
            --depth 1 `
            --branch "v$env:SQLCIPHER_VERSION" `
            https://github.com/sqlcipher/sqlcipher.git `
            $env:SQLCIPHER_SOURCE

          if (-not (Test-Path "$env:SQLCIPHER_SOURCE\Makefile.msc")) {
            throw "No se descargó correctamente SQLCipher."
          }

      - name: Descargar dependencias oficiales de PHP
        shell: pwsh
        run: |
          $versionParts = $env:PHP_VERSION.Split(".")
          $phpBranch = "$($versionParts[0]).$($versionParts[1])"

          $task = @"
          @echo off
          setlocal EnableExtensions

          cd /d "%PHP_SOURCE%"

          call phpsdk_deps --update --branch $phpBranch

          if errorlevel 1 exit /b %errorlevel%

          exit /b 0
          "@

          $taskPath = Join-Path $env:BUILD_ROOT "download-deps.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló phpsdk_deps."
          }

      - name: Localizar OpenSSL
        shell: pwsh
        run: |
          $opensslHeader = Get-Item `
            "$env:PHP_DEPS\include\openssl\evp.h" `
            -ErrorAction SilentlyContinue

          if (-not $opensslHeader) {
            throw "No se encontró openssl\evp.h."
          }

          $libcrypto = Get-Item `
            "$env:PHP_DEPS\lib\libcrypto.lib" `
            -ErrorAction SilentlyContinue

          $libssl = Get-Item `
            "$env:PHP_DEPS\lib\libssl.lib" `
            -ErrorAction SilentlyContinue

          if (-not $libcrypto -or -not $libssl) {
            throw "No se encontraron libcrypto.lib o libssl.lib."
          }

          Add-Content `
            -Path $env:GITHUB_ENV `
            -Value "OPENSSL_INCLUDE=$env:PHP_DEPS\include" `
            -Encoding utf8

          Add-Content `
            -Path $env:GITHUB_ENV `
            -Value "OPENSSL_LIB=$env:PHP_DEPS\lib" `
            -Encoding utf8

      - name: Corregir Makefile.msc
        shell: pwsh
        run: |
          $makefilePath = "$env:SQLCIPHER_SOURCE\Makefile.msc"

          $content = Get-Content $makefilePath -Raw
          $content = $content.Replace("/NODEFAULTLIB:msvcrt", "")
          $content = $content.Replace("-NODEFAULTLIB:msvcrt", "")

          Set-Content `
            -Path $makefilePath `
            -Value $content `
            -Encoding ascii

      - name: Generar amalgamación SQLCipher
        shell: pwsh
        run: |
          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%SQLCIPHER_SOURCE%"

          del /q sqlite3.c 2>nul
          del /q sqlite3.h 2>nul
          del /q sqlite3ext.h 2>nul
          del /q lemon.exe 2>nul
          del /q lemon.obj 2>nul
          del /q jimsh0.exe 2>nul
          del /q jimsh0.obj 2>nul

          nmake /nologo /f Makefile.msc sqlite3.c ^
            PLATFORM=x64 ^
            USE_CRT_DLL=1 ^
            USE_NATIVE_LIBPATHS=1 ^
            SYMBOLS=0 ^
            DEBUG=0 ^
            NO_TCL=1 ^
            USE_FULLWARN=0 ^
            OPTIMIZATIONS=2

          if errorlevel 1 exit /b %errorlevel%

          if not exist sqlite3.c exit /b 1
          if not exist sqlite3.h exit /b 1
          if not exist sqlite3ext.h exit /b 1

          exit /b 0
          '@

          $taskPath = Join-Path $env:BUILD_ROOT "generate-sqlcipher.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló la generación de la amalgamación SQLCipher."
          }

      - name: Compilar SQLCipher DLL
        shell: pwsh
        run: |
          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%SQLCIPHER_SOURCE%"

          del /q sqlite3.obj 2>nul
          del /q sqlite3.dll 2>nul
          del /q libsqlite3.lib 2>nul
          del /q sqlite3.exp 2>nul

          cl.exe ^
            /nologo ^
            /O2 ^
            /MD ^
            /LD ^
            /D_CRT_SECURE_NO_WARNINGS=1 ^
            /DHAVE_STDINT_H=1 ^
            /DSQLITE_HAS_CODEC=1 ^
            /DSQLITE_EXTRA_INIT=sqlcipher_extra_init ^
            /DSQLITE_EXTRA_SHUTDOWN=sqlcipher_extra_shutdown ^
            /DSQLCIPHER_CRYPTO_OPENSSL=1 ^
            /DSQLITE_TEMP_STORE=2 ^
            /DSQLITE_THREADSAFE=1 ^
            /DSQLITE_ENABLE_COLUMN_METADATA=1 ^
            /DSQLITE_ENABLE_FTS3=1 ^
            /DSQLITE_ENABLE_FTS4=1 ^
            /DSQLITE_ENABLE_FTS5=1 ^
            /DSQLITE_ENABLE_RTREE=1 ^
            /DSQLITE_ENABLE_UNLOCK_NOTIFY=1 ^
            /DSQLITE_ENABLE_MATH_FUNCTIONS=1 ^
            /DSQLITE_API=__declspec(dllexport) ^
            /I"%OPENSSL_INCLUDE%" ^
            sqlite3.c ^
            /link ^
            /OUT:sqlite3.dll ^
            /IMPLIB:libsqlite3.lib ^
            /LIBPATH:"%OPENSSL_LIB%" ^
            libcrypto.lib ^
            libssl.lib ^
            crypt32.lib ^
            bcrypt.lib ^
            advapi32.lib ^
            user32.lib ^
            ws2_32.lib

          if errorlevel 1 exit /b %errorlevel%

          if not exist sqlite3.dll exit /b 1
          if not exist libsqlite3.lib exit /b 1

          exit /b 0
          '@

          $taskPath = Join-Path $env:BUILD_ROOT "compile-sqlcipher.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló la compilación de SQLCipher."
          }

      - name: Reemplazar SQLite oficial por SQLCipher en deps
        shell: pwsh
        run: |
          $includeDirectory = "$env:PHP_DEPS\include"
          $libDirectory = "$env:PHP_DEPS\lib"
          $binDirectory = "$env:PHP_DEPS\bin"

          Get-ChildItem `
            -Path $libDirectory `
            -Filter "*sqlite*.lib" `
            -File `
            -ErrorAction SilentlyContinue |
            Remove-Item -Force

          Get-ChildItem `
            -Path $binDirectory `
            -Filter "*sqlite*.dll" `
            -File `
            -ErrorAction SilentlyContinue |
            Remove-Item -Force

          Remove-Item `
            "$includeDirectory\sqlite3.h" `
            -Force `
            -ErrorAction SilentlyContinue

          Remove-Item `
            "$includeDirectory\sqlite3ext.h" `
            -Force `
            -ErrorAction SilentlyContinue

          Copy-Item `
            "$env:SQLCIPHER_SOURCE\sqlite3.h" `
            "$includeDirectory\sqlite3.h" `
            -Force

          Copy-Item `
            "$env:SQLCIPHER_SOURCE\sqlite3ext.h" `
            "$includeDirectory\sqlite3ext.h" `
            -Force

          Copy-Item `
            "$env:SQLCIPHER_SOURCE\libsqlite3.lib" `
            "$libDirectory\libsqlite3.lib" `
            -Force

          Copy-Item `
            "$env:SQLCIPHER_SOURCE\libsqlite3.lib" `
            "$libDirectory\libsqlite3_a.lib" `
            -Force

          Copy-Item `
            "$env:SQLCIPHER_SOURCE\sqlite3.dll" `
            "$binDirectory\sqlite3.dll" `
            -Force

          foreach ($requiredFile in @(
            "$includeDirectory\sqlite3.h",
            "$includeDirectory\sqlite3ext.h",
            "$libDirectory\libsqlite3.lib",
            "$libDirectory\libsqlite3_a.lib",
            "$binDirectory\sqlite3.dll"
          )) {
            if (-not (Test-Path $requiredFile)) {
              throw "Archivo requerido ausente: $requiredFile"
            }
          }

      - name: Verificar SQLCipher directamente desde sqlite3.dll
        shell: pwsh
        run: |
          $testSource = @'
          #include <stdio.h>
          #include "sqlite3.h"

          int main(void)
          {
              sqlite3 *database = NULL;
              sqlite3_stmt *statement = NULL;

              if (sqlite3_open(":memory:", &database) != SQLITE_OK) {
                  return 1;
              }

              if (
                  sqlite3_prepare_v2(
                      database,
                      "PRAGMA cipher_version;",
                      -1,
                      &statement,
                      NULL
                  ) != SQLITE_OK
              ) {
                  sqlite3_close(database);
                  return 1;
              }

              if (sqlite3_step(statement) != SQLITE_ROW) {
                  sqlite3_finalize(statement);
                  sqlite3_close(database);
                  return 1;
              }

              const unsigned char *version =
                  sqlite3_column_text(statement, 0);

              if (version == NULL || version[0] == '\0') {
                  sqlite3_finalize(statement);
                  sqlite3_close(database);
                  return 1;
              }

              printf("SQLCipher DLL: %s\n", version);

              sqlite3_finalize(statement);
              sqlite3_close(database);

              return 0;
          }
          '@

          Set-Content `
            -Path "$env:BUILD_ROOT\test-sqlcipher-dll.c" `
            -Value $testSource `
            -Encoding ascii

          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%BUILD_ROOT%"

          cl.exe ^
            /nologo ^
            /O2 ^
            /MD ^
            /I"%SQLCIPHER_SOURCE%" ^
            test-sqlcipher-dll.c ^
            /link ^
            /OUT:test-sqlcipher-dll.exe ^
            /LIBPATH:"%SQLCIPHER_SOURCE%" ^
            libsqlite3.lib

          if errorlevel 1 exit /b %errorlevel%

          copy /Y "%SQLCIPHER_SOURCE%\sqlite3.dll" "%BUILD_ROOT%\sqlite3.dll" >nul
          copy /Y "%PHP_DEPS%\bin\libcrypto*.dll" "%BUILD_ROOT%\" >nul 2>nul
          copy /Y "%PHP_DEPS%\bin\libssl*.dll" "%BUILD_ROOT%\" >nul 2>nul

          "%BUILD_ROOT%\test-sqlcipher-dll.exe"

          if errorlevel 1 exit /b %errorlevel%

          exit /b 0
          '@

          $taskPath = Join-Path $env:BUILD_ROOT "test-sqlcipher-dll.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "La sqlite3.dll compilada no expone SQLCipher."
          }

      - name: Ejecutar buildconf
        shell: pwsh
        run: |
          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%PHP_SOURCE%"

          call buildconf.bat --force

          if errorlevel 1 exit /b %errorlevel%

          exit /b 0
          '@

          $taskPath = Join-Path $env:BUILD_ROOT "php-buildconf.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló buildconf."
          }

      - name: Configurar PHP con SQLCipher
        shell: pwsh
        run: |
          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%PHP_SOURCE%"

          call configure.bat ^
            --disable-all ^
            --disable-zts ^
            --enable-cli ^
            --enable-cgi ^
            --enable-pdo ^
            --enable-ctype ^
            --enable-filter ^
            --enable-session ^
            --enable-tokenizer ^
            --enable-mbstring ^
            --enable-fileinfo ^
            --enable-sockets ^
            --enable-phar ^
            --enable-opcache ^
            --with-openssl ^
            --with-curl ^
            --with-zlib ^
            --with-zip ^
            --with-iconv ^
            --with-sqlite3=shared ^
            --with-pdo-sqlite=shared ^
            --with-php-build="%PHP_DEPS%"

          if errorlevel 1 exit /b %errorlevel%

          exit /b 0
          '@

          $taskPath = Join-Path $env:BUILD_ROOT "php-configure.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló configure."
          }

      - name: Compilar PHP
        shell: pwsh
        run: |
          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%PHP_SOURCE%"

          nmake

          if errorlevel 1 exit /b %errorlevel%

          exit /b 0
          '@

          $taskPath = Join-Path $env:BUILD_ROOT "php-nmake.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló la compilación de PHP."
          }

      - name: Verificar enlace de extensiones SQLite
        shell: pwsh
        run: |
          $pdoSqliteDll = Get-ChildItem `
            -Path $env:PHP_SOURCE `
            -Filter "php_pdo_sqlite.dll" `
            -Recurse `
            -File |
            Select-Object -First 1

          $phpSqlite3Dll = Get-ChildItem `
            -Path $env:PHP_SOURCE `
            -Filter "php_sqlite3.dll" `
            -Recurse `
            -File |
            Select-Object -First 1

          if (-not $pdoSqliteDll -or -not $phpSqlite3Dll) {
            throw "No se encontraron las extensiones SQLite."
          }

          $pdoImports = & dumpbin.exe /DEPENDENTS $pdoSqliteDll.FullName
          $sqliteImports = & dumpbin.exe /DEPENDENTS $phpSqlite3Dll.FullName

          $combinedImports = ($pdoImports + $sqliteImports) -join "`n"

          if ($combinedImports -notmatch "sqlite3\.dll") {
            throw "Las extensiones PHP no dependen de sqlite3.dll."
          }

          Add-Content `
            -Path $env:GITHUB_ENV `
            -Value "PDO_SQLITE_DLL=$($pdoSqliteDll.FullName)" `
            -Encoding utf8

          Add-Content `
            -Path $env:GITHUB_ENV `
            -Value "PHP_SQLITE3_DLL=$($phpSqlite3Dll.FullName)" `
            -Encoding utf8

      - name: Localizar PHP compilado
        shell: pwsh
        run: |
          $phpExecutable = Get-ChildItem `
            -Path $env:PHP_SOURCE `
            -Filter "php.exe" `
            -Recurse `
            -File |
            Where-Object {
              $_.FullName -match '[\\/]x64[\\/]Release[\\/]php\.exe$'
            } |
            Select-Object -First 1

          if (-not $phpExecutable) {
            throw "No se encontró php.exe."
          }

          Add-Content `
            -Path $env:GITHUB_ENV `
            -Value "PHP_RELEASE=$($phpExecutable.Directory.FullName)" `
            -Encoding utf8

      - name: Preparar distribución
        shell: pwsh
        run: |
          if (Test-Path $env:OUTPUT_DIRECTORY) {
            Remove-Item $env:OUTPUT_DIRECTORY -Recurse -Force
          }

          New-Item `
            -ItemType Directory `
            -Force `
            -Path `
              $env:OUTPUT_DIRECTORY, `
              "$env:OUTPUT_DIRECTORY\ext" |
            Out-Null

          Copy-Item `
            "$env:PHP_RELEASE\*" `
            $env:OUTPUT_DIRECTORY `
            -Recurse `
            -Force

          Copy-Item `
            $env:PDO_SQLITE_DLL `
            "$env:OUTPUT_DIRECTORY\ext\php_pdo_sqlite.dll" `
            -Force

          Copy-Item `
            $env:PHP_SQLITE3_DLL `
            "$env:OUTPUT_DIRECTORY\ext\php_sqlite3.dll" `
            -Force

          Get-ChildItem `
            "$env:PHP_DEPS\bin" `
            -Filter "*.dll" `
            -File `
            -ErrorAction SilentlyContinue |
            ForEach-Object {
              Copy-Item $_.FullName $env:OUTPUT_DIRECTORY -Force
            }

          Copy-Item `
            "$env:SQLCIPHER_SOURCE\sqlite3.dll" `
            "$env:OUTPUT_DIRECTORY\sqlite3.dll" `
            -Force

      - name: Crear php.ini
        shell: pwsh
        run: |
          @'
          [PHP]

          extension_dir="ext"

          extension=php_pdo_sqlite.dll
          extension=php_sqlite3.dll

          display_errors=On
          display_startup_errors=On
          error_reporting=E_ALL

          date.timezone=America/Santiago
          memory_limit=512M
          max_execution_time=0
          '@ | Set-Content `
            -Path "$env:OUTPUT_DIRECTORY\php.ini" `
            -Encoding ascii

      - name: Verificar SQLCipher desde PHP
        shell: pwsh
        run: |
          $script = @'
          <?php

          declare(strict_types=1);

          $pdo = new PDO(
              'sqlite::memory:',
              null,
              null,
              [
                  PDO::ATTR_ERRMODE =>
                      PDO::ERRMODE_EXCEPTION,
              ]
          );

          $version = $pdo
              ->query('PRAGMA cipher_version;')
              ->fetchColumn();

          if (!is_string($version) || trim($version) === '') {
              fwrite(
                  STDERR,
                  "ERROR: SQLCipher no está disponible.\n"
              );

              exit(1);
          }

          echo "SQLCipher: {$version}\n";

          $databasePath = sys_get_temp_dir()
              .DIRECTORY_SEPARATOR
              .'sqlcipher-test.sqlite';

          @unlink($databasePath);

          $database = new PDO(
              'sqlite:'.$databasePath,
              null,
              null,
              [
                  PDO::ATTR_ERRMODE =>
                      PDO::ERRMODE_EXCEPTION,
              ]
          );

          $database->exec(
              "PRAGMA key = 'clave-prueba-github';"
          );

          $database->exec(
              'CREATE TABLE prueba (
                  id INTEGER PRIMARY KEY,
                  valor TEXT NOT NULL
              );'
          );

          $database->exec(
              "INSERT INTO prueba (valor)
               VALUES ('correcto');"
          );

          unset($database);

          $header = file_get_contents(
              $databasePath,
              false,
              null,
              0,
              16
          );

          if ($header === false) {
              exit(1);
          }

          if (str_starts_with($header, 'SQLite format 3')) {
              fwrite(
                  STDERR,
                  "ERROR: El archivo no está cifrado.\n"
              );

              exit(1);
          }

          $database = new PDO(
              'sqlite:'.$databasePath,
              null,
              null,
              [
                  PDO::ATTR_ERRMODE =>
                      PDO::ERRMODE_EXCEPTION,
              ]
          );

          $database->exec(
              "PRAGMA key = 'clave-prueba-github';"
          );

          $value = $database
              ->query(
                  'SELECT valor FROM prueba LIMIT 1;'
              )
              ->fetchColumn();

          if ($value !== 'correcto') {
              exit(1);
          }

          echo "Prueba SQLCipher completada.\n";

          @unlink($databasePath);
          '@

          $scriptPath = Join-Path $env:BUILD_ROOT "test-sqlcipher.php"

          Set-Content `
            -Path $scriptPath `
            -Value $script `
            -Encoding utf8

          & "$env:OUTPUT_DIRECTORY\php.exe" `
            -c "$env:OUTPUT_DIRECTORY\php.ini" `
            $scriptPath

          if ($LASTEXITCODE -ne 0) {
            throw "La validación SQLCipher falló."
          }

      - name: Crear ZIP
        shell: pwsh
        run: |
          if (Test-Path $env:PACKAGE_DIRECTORY) {
            Remove-Item $env:PACKAGE_DIRECTORY -Recurse -Force
          }

          New-Item `
            -ItemType Directory `
            -Force `
            -Path $env:PACKAGE_DIRECTORY |
            Out-Null

          $zipName = (
            "php-{0}-nts-windows-x64-sqlcipher-{1}.zip" -f
            $env:PHP_VERSION,
            $env:SQLCIPHER_VERSION
          )

          $zipPath = Join-Path `
            $env:PACKAGE_DIRECTORY `
            $zipName

          Compress-Archive `
            -Path "$env:OUTPUT_DIRECTORY\*" `
            -DestinationPath $zipPath `
            -CompressionLevel Optimal `
            -Force

          Add-Content `
            -Path $env:GITHUB_ENV `
            -Value "ZIP_PATH=$zipPath" `
            -Encoding utf8

      - name: Publicar artefacto
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ inputs.php_version }}-windows-x64-sqlcipher-${{ inputs.sqlcipher_version }}
          path: ${{ env.ZIP_PATH }}
          if-no-files-found: error
          retention-days: 30
