```yaml
name: Build PHP with SQLCipher for Windows

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: "Versión exacta de PHP"
        required: true
        default: "8.5.7"

      sqlcipher_version:
        description: "Versión exacta de SQLCipher"
        required: true
        default: "4.16.0"

permissions:
  contents: read

jobs:
  build:
    name: PHP ${{ inputs.php_version }} + SQLCipher ${{ inputs.sqlcipher_version }}
    runs-on: windows-2022
    timeout-minutes: 180

    env:
      PHP_VERSION: ${{ inputs.php_version }}
      SQLCIPHER_VERSION: ${{ inputs.sqlcipher_version }}

      BUILD_ROOT: C:\build
      PHP_SDK: C:\php-sdk
      PHP_TREE_NAME: phpdev

      SQLCIPHER_SOURCE: C:\build\sqlcipher
      OUTPUT_DIRECTORY: C:\build\output
      PACKAGE_DIRECTORY: C:\build\package

    steps:
      # ============================================================
      # PREPARACIÓN
      # ============================================================

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Visual Studio 2022 x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Mostrar entorno
        shell: pwsh
        run: |
          Write-Host "PHP_VERSION=$env:PHP_VERSION"
          Write-Host "SQLCIPHER_VERSION=$env:SQLCIPHER_VERSION"

          Write-Host ""
          Write-Host "Compilador:"

          where.exe cl
          cl 2>&1 | Select-Object -First 5

          Write-Host ""
          Write-Host "NMake:"

          where.exe nmake

          Write-Host ""
          Write-Host "Git:"

          git --version

      - name: Crear directorios
        shell: pwsh
        run: |
          New-Item `
            -ItemType Directory `
            -Force `
            -Path `
              $env:BUILD_ROOT, `
              $env:OUTPUT_DIRECTORY, `
              $env:PACKAGE_DIRECTORY |
            Out-Null

      # ============================================================
      # PHP SDK
      # ============================================================

      - name: Descargar PHP SDK
        shell: pwsh
        run: |
          if (Test-Path $env:PHP_SDK) {
            Remove-Item `
              $env:PHP_SDK `
              -Recurse `
              -Force
          }

          git clone `
            --depth 1 `
            --branch php-sdk-2.7.1 `
            https://github.com/php/php-sdk-binary-tools.git `
            $env:PHP_SDK

          $sdkLauncher = Join-Path `
            $env:PHP_SDK `
            "phpsdk-vs17-x64.bat"

          if (-not (Test-Path $sdkLauncher)) {
            throw "No se encontró phpsdk-vs17-x64.bat."
          }

      - name: Crear árbol de compilación PHP
        shell: pwsh
        run: |
          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%PHP_SDK%"

          call phpsdk_buildtree %PHP_TREE_NAME%

          if errorlevel 1 exit /b %errorlevel%

          exit /b 0
          '@

          $taskPath = Join-Path `
            $env:BUILD_ROOT `
            "create-buildtree.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló phpsdk_buildtree."
          }

      - name: Localizar árbol PHP SDK
        shell: pwsh
        run: |
          $treeRoot = Join-Path `
            $env:PHP_SDK `
            $env:PHP_TREE_NAME

          if (-not (Test-Path $treeRoot)) {
            throw "No existe el árbol PHP SDK: $treeRoot"
          }

          $architectureRoot = Get-ChildItem `
            -Path $treeRoot `
            -Directory `
            -Recurse |
            Where-Object {
              $_.Name -eq "x64" -and
              $_.Parent.Name -match "^vs[0-9]+$"
            } |
            Select-Object -First 1

          if (-not $architectureRoot) {
            Get-ChildItem `
              -Path $treeRoot `
              -Directory `
              -Recurse |
              Select-Object FullName

            throw "No se encontró el directorio vsXX\x64."
          }

          $phpBuildRoot = $architectureRoot.FullName
          $phpSource = Join-Path $phpBuildRoot "php-src"
          $phpDeps = Join-Path $phpBuildRoot "deps"

          "PHP_BUILD_ROOT=$phpBuildRoot" >> $env:GITHUB_ENV
          "PHP_SOURCE=$phpSource" >> $env:GITHUB_ENV
          "PHP_DEPS=$phpDeps" >> $env:GITHUB_ENV

          Write-Host "PHP_BUILD_ROOT=$phpBuildRoot"
          Write-Host "PHP_SOURCE=$phpSource"
          Write-Host "PHP_DEPS=$phpDeps"

      # ============================================================
      # FUENTES
      # ============================================================

      - name: Descargar PHP
        shell: pwsh
        run: |
          if (Test-Path $env:PHP_SOURCE) {
            Remove-Item `
              $env:PHP_SOURCE `
              -Recurse `
              -Force
          }

          git clone `
            --depth 1 `
            --branch "php-$env:PHP_VERSION" `
            https://github.com/php/php-src.git `
            $env:PHP_SOURCE

          if (-not (
            Test-Path "$env:PHP_SOURCE\buildconf.bat"
          )) {
            throw "No se descargó correctamente PHP."
          }

          git -C $env:PHP_SOURCE describe --tags --always

      - name: Descargar SQLCipher
        shell: pwsh
        run: |
          if (Test-Path $env:SQLCIPHER_SOURCE) {
            Remove-Item `
              $env:SQLCIPHER_SOURCE `
              -Recurse `
              -Force
          }

          git clone `
            --depth 1 `
            --branch "v$env:SQLCIPHER_VERSION" `
            https://github.com/sqlcipher/sqlcipher.git `
            $env:SQLCIPHER_SOURCE

          if (-not (
            Test-Path "$env:SQLCIPHER_SOURCE\Makefile.msc"
          )) {
            throw "No se descargó correctamente SQLCipher."
          }

          git -C $env:SQLCIPHER_SOURCE describe --tags --always

      # ============================================================
      # DEPENDENCIAS PHP
      # ============================================================

      - name: Descargar dependencias oficiales de PHP
        shell: pwsh
        run: |
          $versionParts = $env:PHP_VERSION.Split(".")

          if ($versionParts.Count -lt 2) {
            throw "PHP_VERSION no es válido."
          }

          $phpBranch = "$($versionParts[0]).$($versionParts[1])"

          Write-Host "Rama de dependencias PHP: $phpBranch"

          $task = @"
          @echo off
          setlocal EnableExtensions

          cd /d "%PHP_SOURCE%"

          call phpsdk_deps --update --branch $phpBranch

          if errorlevel 1 exit /b %errorlevel%

          exit /b 0
          "@

          $taskPath = Join-Path `
            $env:BUILD_ROOT `
            "download-deps.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló phpsdk_deps."
          }

      - name: Verificar directorio deps
        shell: pwsh
        run: |
          if (-not (Test-Path $env:PHP_DEPS)) {
            throw "No existe PHP_DEPS: $env:PHP_DEPS"
          }

          foreach ($directory in @(
            "$env:PHP_DEPS\include",
            "$env:PHP_DEPS\lib",
            "$env:PHP_DEPS\bin"
          )) {
            New-Item `
              -ItemType Directory `
              -Force `
              -Path $directory |
              Out-Null
          }

          Get-ChildItem `
            -Path $env:PHP_DEPS `
            -Directory |
            Select-Object FullName

      - name: Localizar OpenSSL
        shell: pwsh
        run: |
          $opensslHeader = Get-ChildItem `
            -Path $env:PHP_DEPS `
            -Filter "evp.h" `
            -Recurse `
            -ErrorAction SilentlyContinue |
            Where-Object {
              $_.FullName -match "[\\/]openssl[\\/]evp\.h$"
            } |
            Select-Object -First 1

          if (-not $opensslHeader) {
            throw "No se encontró openssl\evp.h."
          }

          $opensslDirectory = Split-Path `
            $opensslHeader.FullName `
            -Parent

          $opensslInclude = Split-Path `
            $opensslDirectory `
            -Parent

          $libcrypto = Get-ChildItem `
            -Path $env:PHP_DEPS `
            -Filter "libcrypto.lib" `
            -Recurse `
            -ErrorAction SilentlyContinue |
            Select-Object -First 1

          if (-not $libcrypto) {
            throw "No se encontró libcrypto.lib."
          }

          $libssl = Get-ChildItem `
            -Path $env:PHP_DEPS `
            -Filter "libssl.lib" `
            -Recurse `
            -ErrorAction SilentlyContinue |
            Select-Object -First 1

          if (-not $libssl) {
            throw "No se encontró libssl.lib."
          }

          $opensslLib = $libcrypto.Directory.FullName

          "OPENSSL_INCLUDE=$opensslInclude" >> $env:GITHUB_ENV
          "OPENSSL_LIB=$opensslLib" >> $env:GITHUB_ENV

          Write-Host "OPENSSL_INCLUDE=$opensslInclude"
          Write-Host "OPENSSL_LIB=$opensslLib"

          Get-Item `
            $opensslHeader.FullName, `
            $libcrypto.FullName, `
            $libssl.FullName |
            Select-Object FullName, Length

      # ============================================================
      # SQLCIPHER
      # ============================================================

      - name: Corregir Makefile.msc para Visual Studio 2022
        shell: pwsh
        run: |
          $makefilePath = Join-Path `
            $env:SQLCIPHER_SOURCE `
            "Makefile.msc"

          if (-not (Test-Path $makefilePath)) {
            throw "No se encontró Makefile.msc."
          }

          $makefileContent = Get-Content `
            -Path $makefilePath `
            -Raw

          $makefileContent = $makefileContent.Replace(
            "/NODEFAULTLIB:msvcrt",
            ""
          )

          $makefileContent = $makefileContent.Replace(
            "-NODEFAULTLIB:msvcrt",
            ""
          )

          Set-Content `
            -Path $makefilePath `
            -Value $makefileContent `
            -Encoding ascii

          $remaining = Select-String `
            -Path $makefilePath `
            -Pattern "NODEFAULTLIB:msvcrt" `
            -SimpleMatch

          if ($remaining) {
            throw "No fue posible eliminar NODEFAULTLIB:msvcrt."
          }

          Write-Host "Makefile.msc corregido."

      - name: Generar amalgamación SQLCipher
        shell: pwsh
        run: |
          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%SQLCIPHER_SOURCE%"

          echo Limpiando archivos generados...

          del /q sqlite3.c 2>nul
          del /q sqlite3.h 2>nul
          del /q sqlite3ext.h 2>nul
          del /q parse.c 2>nul
          del /q parse.h 2>nul
          del /q keywordhash.h 2>nul
          del /q opcodes.c 2>nul
          del /q opcodes.h 2>nul
          del /q pragma.h 2>nul

          del /q lemon.exe 2>nul
          del /q lemon.obj 2>nul
          del /q lemon.pdb 2>nul

          del /q jimsh0.exe 2>nul
          del /q jimsh0.obj 2>nul

          echo Generando amalgamacion SQLCipher...

          nmake /nologo /f Makefile.msc sqlite3.c ^
            PLATFORM=x64 ^
            USE_CRT_DLL=1 ^
            USE_NATIVE_LIBPATHS=1 ^
            SYMBOLS=0 ^
            DEBUG=0 ^
            NO_TCL=1 ^
            USE_FULLWARN=0 ^
            OPTIMIZATIONS=2

          if errorlevel 1 (
            echo ERROR: nmake no pudo generar sqlite3.c.
            exit /b %errorlevel%
          )

          if not exist sqlite3.c (
            echo ERROR: No se genero sqlite3.c.
            exit /b 1
          )

          if not exist sqlite3.h (
            echo ERROR: No se genero sqlite3.h.
            exit /b 1
          )

          if not exist sqlite3ext.h (
            echo ERROR: No se genero sqlite3ext.h.
            exit /b 1
          )

          echo Amalgamacion SQLCipher generada correctamente.

          exit /b 0
          '@

          $taskPath = Join-Path `
            $env:BUILD_ROOT `
            "generate-sqlcipher.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló la generación de la amalgamación SQLCipher."
          }

          foreach ($requiredFile in @(
            "$env:SQLCIPHER_SOURCE\sqlite3.c",
            "$env:SQLCIPHER_SOURCE\sqlite3.h",
            "$env:SQLCIPHER_SOURCE\sqlite3ext.h"
          )) {
            if (-not (Test-Path $requiredFile)) {
              throw "SQLCipher no generó: $requiredFile"
            }

            Get-Item $requiredFile |
              Select-Object FullName, Length, LastWriteTime
          }

      - name: Compilar SQLCipher DLL
        shell: pwsh
        run: |
          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%SQLCIPHER_SOURCE%"

          del /q sqlite3.obj 2>nul
          del /q sqlite3.dll 2>nul
          del /q sqlite3.lib 2>nul
          del /q sqlite3.exp 2>nul
          del /q sqlite3.pdb 2>nul

          cl.exe ^
            /nologo ^
            /O2 ^
            /MD ^
            /LD ^
            /D_CRT_SECURE_NO_WARNINGS=1 ^
            /D_CRT_NONSTDC_NO_DEPRECATE=1 ^
            /DHAVE_STDINT_H=1 ^
            /DSQLITE_HAS_CODEC=1 ^
            /DSQLITE_EXTRA_INIT=sqlcipher_extra_init ^
            /DSQLITE_EXTRA_SHUTDOWN=sqlcipher_extra_shutdown ^
            /DSQLCIPHER_CRYPTO_OPENSSL=1 ^
            /DSQLITE_TEMP_STORE=2 ^
            /DSQLITE_THREADSAFE=1 ^
            /DSQLITE_ENABLE_COLUMN_METADATA=1 ^
            /DSQLITE_ENABLE_FTS3=1 ^
            /DSQLITE_ENABLE_FTS4=1 ^
            /DSQLITE_ENABLE_FTS5=1 ^
            /DSQLITE_ENABLE_RTREE=1 ^
            /DSQLITE_ENABLE_UNLOCK_NOTIFY=1 ^
            /DSQLITE_ENABLE_MATH_FUNCTIONS=1 ^
            /DSQLITE_API=__declspec(dllexport) ^
            /I"%OPENSSL_INCLUDE%" ^
            sqlite3.c ^
            /link ^
            /OUT:sqlite3.dll ^
            /IMPLIB:sqlite3.lib ^
            /LIBPATH:"%OPENSSL_LIB%" ^
            libcrypto.lib ^
            libssl.lib ^
            crypt32.lib ^
            bcrypt.lib ^
            advapi32.lib ^
            user32.lib ^
            ws2_32.lib

          if errorlevel 1 (
            echo ERROR: Fallo cl.exe compilando SQLCipher.
            exit /b %errorlevel%
          )

          if not exist sqlite3.dll (
            echo ERROR: No se genero sqlite3.dll.
            exit /b 1
          )

          if not exist sqlite3.lib (
            echo ERROR: No se genero sqlite3.lib.
            exit /b 1
          )

          echo SQLCipher compilado correctamente.

          exit /b 0
          '@

          $taskPath = Join-Path `
            $env:BUILD_ROOT `
            "compile-sqlcipher.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló la compilación de SQLCipher."
          }

          foreach ($requiredFile in @(
            "$env:SQLCIPHER_SOURCE\sqlite3.dll",
            "$env:SQLCIPHER_SOURCE\sqlite3.lib"
          )) {
            if (-not (Test-Path $requiredFile)) {
              throw "SQLCipher no generó: $requiredFile"
            }

            Get-Item $requiredFile |
              Select-Object FullName, Length
          }

      - name: Instalar SQLCipher en deps
        shell: pwsh
        run: |
          $includeDirectory = Join-Path `
            $env:PHP_DEPS `
            "include"

          $libDirectory = Join-Path `
            $env:PHP_DEPS `
            "lib"

          $binDirectory = Join-Path `
            $env:PHP_DEPS `
            "bin"

          New-Item `
            -ItemType Directory `
            -Force `
            -Path `
              $includeDirectory, `
              $libDirectory, `
              $binDirectory |
            Out-Null

          Copy-Item `
            "$env:SQLCIPHER_SOURCE\sqlite3.h" `
            "$includeDirectory\sqlite3.h" `
            -Force

          Copy-Item `
            "$env:SQLCIPHER_SOURCE\sqlite3ext.h" `
            "$includeDirectory\sqlite3ext.h" `
            -Force

          Copy-Item `
            "$env:SQLCIPHER_SOURCE\sqlite3.lib" `
            "$libDirectory\sqlite3.lib" `
            -Force

          Copy-Item `
            "$env:SQLCIPHER_SOURCE\sqlite3.dll" `
            "$binDirectory\sqlite3.dll" `
            -Force

          foreach ($requiredFile in @(
            "$includeDirectory\sqlite3.h",
            "$includeDirectory\sqlite3ext.h",
            "$libDirectory\sqlite3.lib",
            "$binDirectory\sqlite3.dll"
          )) {
            if (-not (Test-Path $requiredFile)) {
              throw "No se instaló correctamente: $requiredFile"
            }

            Get-Item $requiredFile |
              Select-Object FullName, Length
          }

      # ============================================================
      # PHP
      # ============================================================

      - name: Ejecutar buildconf
        shell: pwsh
        run: |
          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%PHP_SOURCE%"

          call buildconf.bat --force

          if errorlevel 1 exit /b %errorlevel%

          exit /b 0
          '@

          $taskPath = Join-Path `
            $env:BUILD_ROOT `
            "php-buildconf.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló buildconf."
          }

          if (-not (
            Test-Path "$env:PHP_SOURCE\configure.bat"
          )) {
            throw "No se generó configure.bat."
          }

      - name: Configurar PHP
        shell: pwsh
        run: |
          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%PHP_SOURCE%"

          call configure.bat ^
            --disable-all ^
            --disable-zts ^
            --enable-cli ^
            --enable-cgi ^
            --enable-pdo ^
            --enable-ctype ^
            --enable-filter ^
            --enable-session ^
            --enable-tokenizer ^
            --enable-mbstring ^
            --enable-fileinfo ^
            --enable-sockets ^
            --enable-phar ^
            --enable-opcache ^
            --with-openssl ^
            --with-curl ^
            --with-zlib ^
            --with-zip ^
            --with-iconv ^
            --with-sqlite3=shared ^
            --with-pdo-sqlite=shared ^
            --with-php-build="%PHP_DEPS%"

          if errorlevel 1 exit /b %errorlevel%

          exit /b 0
          '@

          $taskPath = Join-Path `
            $env:BUILD_ROOT `
            "php-configure.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            if (Test-Path "$env:PHP_SOURCE\config.log") {
              Get-Content `
                "$env:PHP_SOURCE\config.log" `
                -Tail 300
            }

            throw "Falló configure."
          }

      - name: Verificar configuración SQLite
        shell: pwsh
        run: |
          $makefilePath = Join-Path `
            $env:PHP_SOURCE `
            "Makefile"

          if (-not (Test-Path $makefilePath)) {
            throw "No se generó el Makefile."
          }

          Select-String `
            -Path $makefilePath `
            -Pattern `
              "php_pdo_sqlite", `
              "php_sqlite3", `
              "sqlite3.lib"

          $makefileContent = Get-Content `
            $makefilePath `
            -Raw

          if ($makefileContent -notmatch "php_pdo_sqlite") {
            throw "pdo_sqlite no quedó configurado."
          }

          if ($makefileContent -notmatch "php_sqlite3") {
            throw "sqlite3 no quedó configurado."
          }

      - name: Compilar PHP
        shell: pwsh
        run: |
          $task = @'
          @echo off
          setlocal EnableExtensions

          cd /d "%PHP_SOURCE%"

          nmake

          if errorlevel 1 exit /b %errorlevel%

          exit /b 0
          '@

          $taskPath = Join-Path `
            $env:BUILD_ROOT `
            "php-nmake.cmd"

          Set-Content `
            -Path $taskPath `
            -Value $task `
            -Encoding ascii

          & cmd.exe /d /s /c `
            "`"$env:PHP_SDK\phpsdk-vs17-x64.bat`" -t `"$taskPath`""

          if ($LASTEXITCODE -ne 0) {
            throw "Falló la compilación de PHP."
          }

      # ============================================================
      # SALIDA
      # ============================================================

      - name: Localizar PHP compilado
        shell: pwsh
        run: |
          $phpExecutable = Get-ChildItem `
            -Path $env:PHP_SOURCE `
            -Filter "php.exe" `
            -Recurse `
            -ErrorAction SilentlyContinue |
            Where-Object {
              $_.Directory.Name -eq "Release"
            } |
            Select-Object -First 1

          if (-not $phpExecutable) {
            throw "No se encontró php.exe."
          }

          $releaseDirectory = $phpExecutable.Directory.FullName

          "PHP_RELEASE=$releaseDirectory" >> $env:GITHUB_ENV

          Write-Host "PHP_RELEASE=$releaseDirectory"

      - name: Localizar extensiones SQLite
        shell: pwsh
        run: |
          $pdoSqliteDll = Get-ChildItem `
            -Path $env:PHP_SOURCE `
            -Filter "php_pdo_sqlite.dll" `
            -Recurse `
            -ErrorAction SilentlyContinue |
            Select-Object -First 1

          $phpSqlite3Dll = Get-ChildItem `
            -Path $env:PHP_SOURCE `
            -Filter "php_sqlite3.dll" `
            -Recurse `
            -ErrorAction SilentlyContinue |
            Select-Object -First 1

          if (-not $pdoSqliteDll) {
            throw "No se generó php_pdo_sqlite.dll."
          }

          if (-not $phpSqlite3Dll) {
            throw "No se generó php_sqlite3.dll."
          }

          "PDO_SQLITE_DLL=$($pdoSqliteDll.FullName)" >>
            $env:GITHUB_ENV

          "PHP_SQLITE3_DLL=$($phpSqlite3Dll.FullName)" >>
            $env:GITHUB_ENV

      - name: Preparar distribución
        shell: pwsh
        run: |
          if (Test-Path $env:OUTPUT_DIRECTORY) {
            Remove-Item `
              $env:OUTPUT_DIRECTORY `
              -Recurse `
              -Force
          }

          New-Item `
            -ItemType Directory `
            -Force `
            -Path `
              $env:OUTPUT_DIRECTORY, `
              "$env:OUTPUT_DIRECTORY\ext" |
            Out-Null

          Copy-Item `
            -Path "$env:PHP_RELEASE\*" `
            -Destination $env:OUTPUT_DIRECTORY `
            -Recurse `
            -Force

          Copy-Item `
            $env:PDO_SQLITE_DLL `
            "$env:OUTPUT_DIRECTORY\ext\php_pdo_sqlite.dll" `
            -Force

          Copy-Item `
            $env:PHP_SQLITE3_DLL `
            "$env:OUTPUT_DIRECTORY\ext\php_sqlite3.dll" `
            -Force

          Get-ChildItem `
            -Path "$env:PHP_DEPS\bin" `
            -Filter "*.dll" `
            -File `
            -ErrorAction SilentlyContinue |
            ForEach-Object {
              Copy-Item `
                $_.FullName `
                $env:OUTPUT_DIRECTORY `
                -Force
            }

          # SQLCipher debe reemplazar cualquier sqlite3.dll convencional.
          Copy-Item `
            "$env:SQLCIPHER_SOURCE\sqlite3.dll" `
            "$env:OUTPUT_DIRECTORY\sqlite3.dll" `
            -Force

      - name: Crear php.ini
        shell: pwsh
        run: |
          $phpIni = @'
          [PHP]

          extension_dir="ext"

          extension=php_pdo_sqlite.dll
          extension=php_sqlite3.dll

          display_errors=On
          display_startup_errors=On
          error_reporting=E_ALL

          date.timezone=America/Santiago
          memory_limit=512M
          max_execution_time=0
          variables_order=GPCS
          '@

          Set-Content `
            -Path "$env:OUTPUT_DIRECTORY\php.ini" `
            -Value $phpIni `
            -Encoding ascii

      # ============================================================
      # PRUEBAS
      # ============================================================

      - name: Verificar archivos
        shell: pwsh
        run: |
          foreach ($requiredFile in @(
            "$env:OUTPUT_DIRECTORY\php.exe",
            "$env:OUTPUT_DIRECTORY\php.ini",
            "$env:OUTPUT_DIRECTORY\sqlite3.dll",
            "$env:OUTPUT_DIRECTORY\ext\php_pdo_sqlite.dll",
            "$env:OUTPUT_DIRECTORY\ext\php_sqlite3.dll"
          )) {
            if (-not (Test-Path $requiredFile)) {
              throw "Archivo requerido ausente: $requiredFile"
            }

            Get-Item $requiredFile |
              Select-Object FullName, Length
          }

      - name: Verificar módulos PHP
        shell: pwsh
        run: |
          $php = "$env:OUTPUT_DIRECTORY\php.exe"
          $phpIni = "$env:OUTPUT_DIRECTORY\php.ini"

          & $php -c $phpIni --ini
          & $php -c $phpIni -v
          & $php -c $phpIni -m

          if ($LASTEXITCODE -ne 0) {
            throw "PHP no pudo ejecutarse."
          }

      - name: Verificar PDO SQLite
        shell: pwsh
        run: |
          $script = @'
          <?php

          declare(strict_types=1);

          echo 'PHP: '.PHP_VERSION.PHP_EOL;

          echo 'pdo_sqlite: '
              .(extension_loaded('pdo_sqlite') ? 'sí' : 'no')
              .PHP_EOL;

          echo 'sqlite3: '
              .(extension_loaded('sqlite3') ? 'sí' : 'no')
              .PHP_EOL;

          $drivers = PDO::getAvailableDrivers();

          echo 'Drivers PDO: '
              .implode(', ', $drivers)
              .PHP_EOL;

          if (!extension_loaded('pdo_sqlite')) {
              fwrite(
                  STDERR,
                  "ERROR: pdo_sqlite no está cargado.\n"
              );

              exit(1);
          }

          if (!extension_loaded('sqlite3')) {
              fwrite(
                  STDERR,
                  "ERROR: sqlite3 no está cargado.\n"
              );

              exit(1);
          }

          if (!in_array('sqlite', $drivers, true)) {
              fwrite(
                  STDERR,
                  "ERROR: PDO SQLite no está disponible.\n"
              );

              exit(1);
          }

          echo "PDO SQLite disponible.\n";
          '@

          $scriptPath = Join-Path `
            $env:BUILD_ROOT `
            "test-pdo-sqlite.php"

          Set-Content `
            -Path $scriptPath `
            -Value $script `
            -Encoding utf8

          & "$env:OUTPUT_DIRECTORY\php.exe" `
            -c "$env:OUTPUT_DIRECTORY\php.ini" `
            $scriptPath

          if ($LASTEXITCODE -ne 0) {
            throw "La validación PDO SQLite falló."
          }

      - name: Verificar SQLCipher
        shell: pwsh
        run: |
          $script = @'
          <?php

          declare(strict_types=1);

          function fail(string $message): never
          {
              fwrite(
                  STDERR,
                  "ERROR: {$message}".PHP_EOL
              );

              exit(1);
          }

          $memoryDatabase = new PDO(
              'sqlite::memory:',
              null,
              null,
              [
                  PDO::ATTR_ERRMODE =>
                      PDO::ERRMODE_EXCEPTION,
              ]
          );

          $cipherVersion = $memoryDatabase
              ->query('PRAGMA cipher_version;')
              ->fetchColumn();

          if (
              !is_string($cipherVersion) ||
              trim($cipherVersion) === ''
          ) {
              fail(
                  'PRAGMA cipher_version no devolvió una versión.'
              );
          }

          echo "SQLCipher: {$cipherVersion}".PHP_EOL;

          $databasePath = sys_get_temp_dir()
              .DIRECTORY_SEPARATOR
              .'sqlcipher-test.sqlite';

          @unlink($databasePath);

          $database = new PDO(
              'sqlite:'.$databasePath,
              null,
              null,
              [
                  PDO::ATTR_ERRMODE =>
                      PDO::ERRMODE_EXCEPTION,
              ]
          );

          $database->exec(
              "PRAGMA key = 'clave-prueba-github';"
          );

          $database->exec(
              'CREATE TABLE prueba (
                  id INTEGER PRIMARY KEY AUTOINCREMENT,
                  valor TEXT NOT NULL
              );'
          );

          $statement = $database->prepare(
              'INSERT INTO prueba (valor)
               VALUES (:valor);'
          );

          $statement->execute([
              'valor' => 'correcto',
          ]);

          unset(
              $statement,
              $database
          );

          $header = file_get_contents(
              $databasePath,
              false,
              null,
              0,
              16
          );

          if ($header === false) {
              fail('No se pudo leer el archivo.');
          }

          if (
              str_starts_with(
                  $header,
                  'SQLite format 3'
              )
          ) {
              fail(
                  'El archivo conserva el encabezado SQLite sin cifrar.'
              );
          }

          $database = new PDO(
              'sqlite:'.$databasePath,
              null,
              null,
              [
                  PDO::ATTR_ERRMODE =>
                      PDO::ERRMODE_EXCEPTION,
              ]
          );

          $database->exec(
              "PRAGMA key = 'clave-prueba-github';"
          );

          $value = $database
              ->query(
                  'SELECT valor
                   FROM prueba
                   LIMIT 1;'
              )
              ->fetchColumn();

          if ($value !== 'correcto') {
              fail(
                  'No se pudo leer el contenido cifrado.'
              );
          }

          unset($database);

          $wrongKeyRejected = false;

          try {
              $wrongDatabase = new PDO(
                  'sqlite:'.$databasePath,
                  null,
                  null,
                  [
                      PDO::ATTR_ERRMODE =>
                          PDO::ERRMODE_EXCEPTION,
                  ]
              );

              $wrongDatabase->exec(
                  "PRAGMA key = 'clave-incorrecta';"
              );

              $wrongDatabase
                  ->query(
                      'SELECT valor
                       FROM prueba
                       LIMIT 1;'
                  )
                  ->fetchColumn();
          } catch (Throwable) {
              $wrongKeyRejected = true;
          }

          if (!$wrongKeyRejected) {
              fail(
                  'La base aceptó una clave incorrecta.'
              );
          }

          echo "Archivo cifrado verificado.".PHP_EOL;
          echo "Clave correcta verificada.".PHP_EOL;
          echo "Clave incorrecta rechazada.".PHP_EOL;
          echo "Prueba SQLCipher completada.".PHP_EOL;

          @unlink($databasePath);
          '@

          $scriptPath = Join-Path `
            $env:BUILD_ROOT `
            "test-sqlcipher.php"

          Set-Content `
            -Path $scriptPath `
            -Value $script `
            -Encoding utf8

          & "$env:OUTPUT_DIRECTORY\php.exe" `
            -c "$env:OUTPUT_DIRECTORY\php.ini" `
            $scriptPath

          if ($LASTEXITCODE -ne 0) {
            throw "La validación SQLCipher falló."
          }

      # ============================================================
      # PAQUETE
      # ============================================================

      - name: Crear información del build
        shell: pwsh
        run: |
          $buildInfo = @"
          PHP con SQLCipher para Windows
          =================================

          PHP: $env:PHP_VERSION
          SQLCipher: $env:SQLCIPHER_VERSION
          Arquitectura: x64
          Thread Safety: NTS
          Compilador: Visual Studio 2022

          Validaciones:
          - PHP ejecutable
          - PDO SQLite cargado
          - Extensión sqlite3 cargada
          - PRAGMA cipher_version funcional
          - Archivo cifrado
          - Lectura con clave correcta
          - Rechazo de clave incorrecta
          "@

          Set-Content `
            -Path "$env:OUTPUT_DIRECTORY\BUILD-INFO.txt" `
            -Value $buildInfo `
            -Encoding utf8

      - name: Crear ZIP
        shell: pwsh
        run: |
          if (Test-Path $env:PACKAGE_DIRECTORY) {
            Remove-Item `
              $env:PACKAGE_DIRECTORY `
              -Recurse `
              -Force
          }

          New-Item `
            -ItemType Directory `
            -Force `
            -Path $env:PACKAGE_DIRECTORY |
            Out-Null

          $zipName = (
            "php-{0}-nts-windows-x64-sqlcipher-{1}.zip" -f
            $env:PHP_VERSION,
            $env:SQLCIPHER_VERSION
          )

          $zipPath = Join-Path `
            $env:PACKAGE_DIRECTORY `
            $zipName

          Compress-Archive `
            -Path "$env:OUTPUT_DIRECTORY\*" `
            -DestinationPath $zipPath `
            -CompressionLevel Optimal `
            -Force

          if (-not (Test-Path $zipPath)) {
            throw "No se generó el ZIP."
          }

          "ZIP_PATH=$zipPath" >> $env:GITHUB_ENV

          Get-Item $zipPath |
            Select-Object FullName, Length

      - name: Publicar artefacto
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ inputs.php_version }}-windows-x64-sqlcipher-${{ inputs.sqlcipher_version }}
          path: ${{ env.ZIP_PATH }}
          if-no-files-found: error
          retention-days: 30
```
